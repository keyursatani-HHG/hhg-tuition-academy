# Local development stack. Postgres is the only required service for the backend.
# The backend service is included for full containerized runs (Phase 8).
services:
  db:
    image: postgres:18-alpine
    container_name: hhg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hhg
      POSTGRES_PASSWORD: hhg_password
      POSTGRES_DB: hhg_academy
    ports:
      - "5432:5432"
    volumes:
      - hhg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hhg -d hhg_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend is wired up in Phase 3 (Dockerfile added then). Uncomment to use.
  # backend:
  #   build: ./backend
  #   container_name: hhg_backend
  #   restart: unless-stopped
  #   env_file: ./backend/.env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   ports:
  #     - "8000:8000"

volumes:
  hhg_pgdata:
