# Full local stack: PostgreSQL + FastAPI backend.
# Usage:  docker compose up --build
# The backend applies migrations on start (see docker-entrypoint.sh).
services:
  db:
    image: postgres:18-alpine
    container_name: hhg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hhg
      POSTGRES_PASSWORD: hhg_password
      POSTGRES_DB: hhg_academy
    ports:
      - "5432:5432"
    volumes:
      - hhg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hhg -d hhg_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hhg_backend
    restart: unless-stopped
    environment:
      # Inside the compose network, reach Postgres by its service name.
      DATABASE_URL: postgresql+asyncpg://hhg:hhg_password@db:5432/hhg_academy
      ENVIRONMENT: production
      DEBUG: "false"
      # Override these in a real deployment (use a .env file or secrets):
      SECRET_KEY: ${SECRET_KEY:-change-me-please-use-a-long-random-string}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  hhg_pgdata:
