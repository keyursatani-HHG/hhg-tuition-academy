name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1

  backend:
    name: Backend (import + migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: hhg
          POSTGRES_PASSWORD: hhg_password
          POSTGRES_DB: hhg_academy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hhg -d hhg_academy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://hhg:hhg_password@localhost:5432/hhg_academy
      SECRET_KEY: ci-test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import check
        run: python -c "import app.main; print('app imports OK')"
      - name: Apply migrations
        run: alembic upgrade head
