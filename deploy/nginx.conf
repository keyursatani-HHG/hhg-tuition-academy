# Nginx reverse proxy for the HHG Academy backend API on a VPS.
# Place at /etc/nginx/sites-available/hhg-api and symlink into sites-enabled.
# Obtain TLS certs with: certbot --nginx -d api.yourdomain.com

upstream hhg_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api.yourdomain.com;

    # Let certbot manage the HTTP->HTTPS redirect after issuing certs.
    location / {
        proxy_pass http://hhg_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Optional: cap upload size for the contact form etc.
    client_max_body_size 5m;
}
